name: CI/CD — Build, Push & Deploy Backend EKS

on:
  push:
    branches:
      - deploy

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build y Push — API Ventas
  # ─────────────────────────────────────────────
  build-ventas:
    name: Build & Push — API Ventas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen Ventas a ECR
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          dockerfile: ./back-Ventas_SpringBoot/Springboot-API-REST/Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/inovatech-backend:ventas-latest

  # ─────────────────────────────────────────────
  # JOB 2: Build y Push — API Despachos
  # ─────────────────────────────────────────────
  build-despachos:
    name: Build & Push — API Despachos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y Push imagen Despachos a ECR
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          dockerfile: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/inovatech-backend:despachos-latest

  # ─────────────────────────────────────────────
  # JOB 3: Deploy en EKS
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy en EKS
    runs-on: ubuntu-latest
    needs: [build-ventas, build-despachos]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Rollout restart Ventas
        run: kubectl rollout restart deployment/ventas-deployment

      - name: Rollout restart Despachos
        run: kubectl rollout restart deployment/despachos-deployment

      - name: Verificar estado del despliegue
        run: |
          kubectl rollout status deployment/ventas-deployment --timeout=180s
          kubectl rollout status deployment/despachos-deployment --timeout=180s
          kubectl get pods
